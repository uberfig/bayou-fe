[package]
name = "bayou-fe"
version = "0.1.0"
edition = "2021"

[dependencies]
chrono = "0.4.38"
gloo-console = "0.3.0"
gloo-net = "0.6.0"
leptos = {version = "0.6.15", features = ["csr"]}
serde = "1.0.214"
serde_json = "1.0.132"
url = {version = "2.5.3", features = ["serde"]}
wasm-bindgen = "0.2.95"
wasm-bindgen-futures = "0.4.45"
wasm-logger = "0.2.0"
web-sys = "0.3.72"
yew = { git = "https://github.com/yewstack/yew/", features = ["csr"] }
# yew = {version = "0.20.0", features = ["csr"]}
yew-feather = {git = "https://github.com/uberfig/yew-feather"}
